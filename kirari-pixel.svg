<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 8x8ピクセルグリッド、きらり星マーク ドット絵版 -->
  <!-- 背景なし(透過) -->

  <!-- 星1 右上 -->
  <rect x="40" y="4"  width="4" height="4" fill="#c9a84c"/>
  <rect x="36" y="8"  width="4" height="4" fill="#c9a84c"/>
  <rect x="44" y="8"  width="4" height="4" fill="#c9a84c"/>
  <rect x="40" y="12" width="4" height="4" fill="#c9a84c"/>

  <!-- 星2 右中 -->
  <rect x="52" y="20" width="4" height="4" fill="#b8956e"/>
  <rect x="48" y="24" width="4" height="4" fill="#b8956e"/>
  <rect x="56" y="24" width="4" height="4" fill="#b8956e"/>
  <rect x="52" y="28" width="4" height="4" fill="#b8956e"/>

  <!-- 星3 右下 -->
  <rect x="44" y="36" width="4" height="4" fill="#c9a84c"/>
  <rect x="40" y="40" width="4" height="4" fill="#c9a84c"/>
  <rect x="48" y="40" width="4" height="4" fill="#c9a84c"/>
  <rect x="44" y="44" width="4" height="4" fill="#c9a84c"/>

  <!-- 星4 左下 -->
  <rect x="20" y="44" width="4" height="4" fill="#b8956e"/>
  <rect x="16" y="48" width="4" height="4" fill="#b8956e"/>
  <rect x="24" y="48" width="4" height="4" fill="#b8956e"/>
  <rect x="20" y="52" width="4" height="4" fill="#b8956e"/>

  <!-- 星5 左中 -->
  <rect x="8"  y="28" width="4" height="4" fill="#c9a84c"/>
  <rect x="4"  y="32" width="4" height="4" fill="#c9a84c"/>
  <rect x="12" y="32" width="4" height="4" fill="#c9a84c"/>
  <rect x="8"  y="36" width="4" height="4" fill="#c9a84c"/>

  <!-- 星6 左上 -->
  <rect x="16" y="12" width="4" height="4" fill="#b8956e"/>
  <rect x="12" y="16" width="4" height="4" fill="#b8956e"/>
  <rect x="20" y="16" width="4" height="4" fill="#b8956e"/>
  <rect x="16" y="20" width="4" height="4" fill="#b8956e"/>

  <!-- テキスト: きらり -->
  <rect x="8"  y="58" width="4" height="4" fill="#c9a84c"/>
  <rect x="14" y="58" width="4" height="4" fill="#c9a84c"/>
  <rect x="20" y="58" width="4" height="4" fill="#c9a84c"/>
  <rect x="26" y="58" width="4" height="4" fill="#c9a84c"/>
  <rect x="32" y="58" width="4" height="4" fill="#c9a84c"/>
  <rect x="38" y="58" width="4" height="4" fill="#c9a84c"/>
</svg>
